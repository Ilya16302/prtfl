  <rect width="32" height="32" rx="8" fill="#071428"/>
  <rect width="32" height="32" rx="8" fill="none" stroke="url(#g)" stroke-width="1" opacity="0.6"/>
  <text x="16" y="22" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="16" fill="url(#g)" filter="url(#glow)">IK</text>
